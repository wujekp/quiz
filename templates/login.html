<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title>Logowanie</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 3vh;
        }

        .login-box {
            width: 420px;
            background: #1c1c1c;
            padding: 24px;
            border-radius: 10px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            text-align: center;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #2196f3;
            color: white;
        }

        .error {
            color: #ff8080;
            min-height: 24px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <form class="login-box" method="post">
        <h2>Logowanie</h2>
        <input type="text" name="login" placeholder="Login" required>
        <input type="password" name="password" placeholder="Hasło" required>
        <button type="submit">Zaloguj</button>
        <div class="error">{{ error }}</div>
    </form>
</body>
</html>
